# ===================================================
# PAYMENT SERVICE CONFIGURATION
# ===================================================
server.port=8080
spring.application.name=payment-service

# ---------------------------------------------------
# MySQL Datasource
# ---------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/food_order_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=152005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------
# Order Service integration
# ---------------------------------------------------
order.service.base-url=http://localhost:8081

# ---------------------------------------------------
# Logging
# ---------------------------------------------------
logging.level.com.foodorder=INFO
