# ===================================================
# ORDER SERVICE CONFIGURATION
# ===================================================
server.port=8081
spring.application.name=order-service

# ---------------------------------------------------
# MySQL Datasource
# ---------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/food_order_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=152005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------
# ActiveMQ
# ---------------------------------------------------
spring.activemq.broker-url=tcp://localhost:61616
spring.activemq.user=admin
spring.activemq.password=admin
spring.jms.pub-sub-domain=false

app.queue.order=order.queue

# ---------------------------------------------------
# Logging
# ---------------------------------------------------
logging.level.com.foodorder=INFO
